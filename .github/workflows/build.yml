name: Build Windows Installer

on:
  # Run automatically when you push a version tag  (e.g. git tag v1.0.0 && git push --tags)
  push:
    tags:
      - 'v*'

  # Also allow a manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0.0)'
        required: false
        default: 'dev'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── 4. Generate icon ──────────────────────────────────────────────────────
      - name: Generate app icon
        run: python installer/create_icon.py

      # ── 5. Build .exe ─────────────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: pyinstaller PDFAnnotator.spec --noconfirm

      - name: Verify exe was produced
        run: |
          if (-not (Test-Path "dist\PDFAnnotator.exe")) {
            Write-Error "dist\PDFAnnotator.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist\PDFAnnotator.exe").Length / 1MB
          Write-Host "Executable size: $([math]::Round($size,1)) MB"
        shell: pwsh

      # ── 6. Download Tesseract components (bundled into the installer) ───────────

      # Resolve the latest UB-Mannheim release tag so the cache key tracks versions
      - name: Resolve latest Tesseract release
        id: tess-version
        shell: pwsh
        run: |
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/UB-Mannheim/tesseract/releases/latest" `
            -Headers @{ "User-Agent" = "GitHub-Actions" }
          $tag = $release.tag_name
          Write-Host "Latest Tesseract release: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Cache Tesseract components
        id: cache-tesseract
        uses: actions/cache@v4
        with:
          path: |
            installer/tesseract-ocr-w64-setup.exe
            installer/tessdata/hin.traineddata
            installer/tessdata/san.traineddata
          key: tesseract-${{ steps.tess-version.outputs.tag }}-tessdata-fast

      - name: Download Tesseract installer and language data
        if: steps.cache-tesseract.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "installer\tessdata" | Out-Null

          # Find the 64-bit Windows setup asset in the release
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/UB-Mannheim/tesseract/releases/latest" `
            -Headers @{ "User-Agent" = "GitHub-Actions" }
          $asset = $release.assets | Where-Object { $_.name -like "tesseract-ocr-w64-setup-*.exe" } | Select-Object -First 1
          if (-not $asset) { Write-Error "Could not find Tesseract w64 setup asset"; exit 1 }
          Write-Host "Downloading Tesseract installer: $($asset.name)"
          curl.exe -L --fail -o "installer\tesseract-ocr-w64-setup.exe" $asset.browser_download_url
          Write-Host "  -> $(([math]::Round((Get-Item 'installer\tesseract-ocr-w64-setup.exe').Length/1MB,1))) MB"

          Write-Host "Downloading Hindi language data..."
          curl.exe -L --fail -o "installer\tessdata\hin.traineddata" "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/hin.traineddata"
          Write-Host "  -> $(([math]::Round((Get-Item 'installer\tessdata\hin.traineddata').Length/1MB,1))) MB"

          Write-Host "Downloading Sanskrit language data..."
          curl.exe -L --fail -o "installer\tessdata\san.traineddata" "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/san.traineddata"
          Write-Host "  -> $(([math]::Round((Get-Item 'installer\tessdata\san.traineddata').Length/1MB,1))) MB"

      - name: Verify Tesseract components present
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Test-Path "installer\tesseract-ocr-w64-setup.exe")) { $missing += "tesseract-ocr-w64-setup.exe" }
          if (-not (Test-Path "installer\tessdata\hin.traineddata"))     { $missing += "hin.traineddata" }
          if (-not (Test-Path "installer\tessdata\san.traineddata"))     { $missing += "san.traineddata" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing Tesseract components: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All Tesseract components present."

      # ── 7. Build installer with Inno Setup ────────────────────────────────────
      - name: Build installer (Inno Setup)
        run: |
          New-Item -ItemType Directory -Force -Path "installer\Output"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Verify installer was produced
        run: |
          if (-not (Test-Path "installer\Output\PDFAnnotatorSetup.exe")) {
            Write-Error "Installer not found!"
            exit 1
          }
          $size = (Get-Item "installer\Output\PDFAnnotatorSetup.exe").Length / 1MB
          Write-Host "Installer size: $([math]::Round($size,1)) MB"
        shell: pwsh

      # ── 8. Upload installer as artifact (always available) ────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnnotatorSetup
          path: installer\Output\PDFAnnotatorSetup.exe
          retention-days: 30

      # ── 9. Create GitHub Release (only on version tags) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PDF Annotation Studio ${{ github.ref_name }}
          body: |
            ## PDF Annotation Studio ${{ github.ref_name }}

            ### Install
            1. Download `PDFAnnotatorSetup.exe` below
            2. Double-click to install — no extra setup needed
            3. Launch from Start Menu or Desktop shortcut

            ### What's included
            - PDF Annotation Studio (annotate PDFs with labeled regions)
            - **Tesseract OCR** (optional, selected by default) — enables the Parse PDF feature
            - **Hindi + Sanskrit language data** — bundled, no internet needed during install
            - Microsoft WebView2 (downloaded automatically if missing, ~2 MB)

            ### Requirements
            - Windows 10 or 11 (64-bit)
            - ~200 MB disk space (includes Tesseract + language data)

            ### What's new
            See commit history for changes in this release.
          files: installer\Output\PDFAnnotatorSetup.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
